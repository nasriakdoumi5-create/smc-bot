name: SMC Elite Bot

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 8

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Restore state cache
        uses: actions/cache@v4
        with:
          path: /tmp/smc_state.json
          key: smc-state-${{ github.run_id }}
          restore-keys: |
            smc-state-

      - name: Install dependencies
        run: npm install --omit=dev

      - name: Run SMC checks
        env:
          TELEGRAM_TOKEN:       ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID:     ${{ secrets.TELEGRAM_CHAT_ID }}
          SYMBOL:               MNQ
          TRADOVATE_USERNAME:   ${{ secrets.TRADOVATE_USERNAME }}
          TRADOVATE_PASSWORD:   ${{ secrets.TRADOVATE_PASSWORD }}
          TRADOVATE_DEVICE_ID:  ${{ secrets.TRADOVATE_DEVICE_ID }}
          TRADOVATE_CID:        ${{ secrets.TRADOVATE_CID }}
          TRADOVATE_SECRET:     ${{ secrets.TRADOVATE_SECRET }}
          TRADOVATE_DEMO:       ${{ secrets.TRADOVATE_DEMO }}
          TRADOVATE_SYMBOL:     ${{ secrets.TRADOVATE_SYMBOL }}
        run: |
          for i in 1 2 3 4 5; do
            echo "فحص رقم $i من 5"
            node run.js || true
            if [ $i -lt 5 ]; then sleep 60; fi
          done
