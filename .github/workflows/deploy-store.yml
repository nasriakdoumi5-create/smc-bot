name: Deploy Store to Vercel

on:
  workflow_dispatch:
  push:
    branches:
      - ecommerce-store

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - run: npm install

      - name: Deploy to Vercel
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: "1yKAojrTgNo2ii5DPJoay8E7"
        run: |
          # v27 predates the "Loading scopes" bug; deploy to personal account
          npx vercel@27 --prod \
            --token="$VERCEL_TOKEN" \
            --name=pawcase-store \
            --yes 2>&1
