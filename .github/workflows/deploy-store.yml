name: Deploy Store to Vercel

on:
  workflow_dispatch:
  push:
    branches:
      - ecommerce-store

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Get Vercel IDs and link project
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          ORG_ID=$(curl -sf https://api.vercel.com/v2/user \
            -H "Authorization: Bearer $VERCEL_TOKEN" | jq -r '.user.id')

          echo "Org ID: $ORG_ID"

          PROJECTS=$(curl -sf https://api.vercel.com/v9/projects \
            -H "Authorization: Bearer $VERCEL_TOKEN")

          echo "All projects:"
          echo "$PROJECTS" | jq -r '.projects[].name'

          PROJECT_ID=$(echo "$PROJECTS" | jq -r '.projects[] | select(.name | ascii_downcase | test("ecommerce|pawcase")) | .id' | head -1)

          if [ -z "$PROJECT_ID" ]; then
            PROJECT_ID=$(echo "$PROJECTS" | jq -r '.projects[0].id')
            echo "Fallback to first project: $PROJECT_ID"
          fi

          echo "Project ID: $PROJECT_ID"

          mkdir -p .vercel
          printf '{"orgId":"%s","projectId":"%s"}' "$ORG_ID" "$PROJECT_ID" > .vercel/project.json
          cat .vercel/project.json

          echo "VERCEL_ORG_ID=$ORG_ID" >> $GITHUB_ENV
          echo "VERCEL_PROJECT_ID=$PROJECT_ID" >> $GITHUB_ENV

      - name: Deploy to Vercel
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ env.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ env.VERCEL_PROJECT_ID }}
        run: npx vercel --prod --token=$VERCEL_TOKEN --yes
