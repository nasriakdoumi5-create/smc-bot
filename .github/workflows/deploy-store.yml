name: Deploy Store to Vercel

on:
  workflow_dispatch:
  push:
    branches:
      - ecommerce-store

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Debug - find project ID
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          echo "=== User ==="
          curl -s https://api.vercel.com/v2/user \
            -H "Authorization: Bearer $VERCEL_TOKEN" | jq '{id: .user.id, name: .user.name}'

          echo "=== Project by name ==="
          curl -s https://api.vercel.com/v9/projects/ecommerce-store \
            -H "Authorization: Bearer $VERCEL_TOKEN" | jq '{id, name}'

          echo "=== Deployments ==="
          curl -s "https://api.vercel.com/v6/deployments?limit=5" \
            -H "Authorization: Bearer $VERCEL_TOKEN" | jq '.deployments[]? | {name, projectId, url}'

          echo "=== Projects list ==="
          curl -s "https://api.vercel.com/v9/projects" \
            -H "Authorization: Bearer $VERCEL_TOKEN" | jq '{error, projects: [.projects[]?.name]}'
