name: Deploy Store to Vercel

on:
  workflow_dispatch:
  push:
    branches:
      - ecommerce-store

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout ecommerce-store branch
        uses: actions/checkout@v4
        with:
          ref: ecommerce-store

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Get Vercel project IDs
        run: |
          ORG_ID=$(curl -s https://api.vercel.com/v2/user \
            -H "Authorization: Bearer ${{ secrets.VERCEL_TOKEN }}" \
            | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['user']['id'])")

          PROJECT_ID=$(curl -s "https://api.vercel.com/v9/projects" \
            -H "Authorization: Bearer ${{ secrets.VERCEL_TOKEN }}" \
            | python3 -c "
import sys,json
data=json.load(sys.stdin)
for p in data.get('projects',[]):
    name=p.get('name','')
    print('FOUND:',name, p.get('id'), file=sys.stderr)
    if 'ecommerce' in name.lower() or 'pawcase' in name.lower():
        print(p['id'])
        break
else:
    # fallback: first project
    projects=data.get('projects',[])
    if projects:
        print(projects[0]['id'])
")

          mkdir -p .vercel
          echo "{\"orgId\":\"$ORG_ID\",\"projectId\":\"$PROJECT_ID\"}" > .vercel/project.json
          cat .vercel/project.json

          echo "VERCEL_ORG_ID=$ORG_ID" >> $GITHUB_ENV
          echo "VERCEL_PROJECT_ID=$PROJECT_ID" >> $GITHUB_ENV
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}

      - name: Deploy to Vercel
        run: npx vercel --prod --token=${{ secrets.VERCEL_TOKEN }} --yes
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ env.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ env.VERCEL_PROJECT_ID }}
